services:
  postgres:
    image: postgres:18
    container_name: dulutheats_postgres
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/migrations/001_baseline.sql:/docker-entrypoint-initdb.d/001_baseline.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: dulutheats_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dulutheats_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      REDIS_ADDR: redis:6379
    command:
      - /bin/sh
      - -c
      - |
        export DATABASE_URL="postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB}?sslmode=disable"
        exec /app/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../backend/.env:/app/.env:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dulutheats_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"

volumes:
  postgres_data: